    <div class="layout">
        <div class="signup-container">
            <h2>회원가입</h2>
                <form>
                    <div class="form-group">
                        <label for="userid">아이디</label>
                        <input type="text" id="userid" name="userid" placeholder="아이디 입력">
                    </div>

                    <div class="form-group">
                        <label for="password">비밀번호</label>
                        <input type="password" id="password" name="password" placeholder="비밀번호 입력">
                    </div>

                    <div class="form-group">
                        <label for="username">이름</label>
                        <input type="text" id="username" name="username" placeholder="이름 입력">
                    </div>

                    <div class="terms">
                        <label><input type="checkbox"> 이용약관 동의 (필수)</label><br>
                        <label><input type="checkbox"> 개인정보 처리방침 동의 (필수)</label><br>
                        <label><input type="checkbox"> 마케팅 정보 수신 동의 (선택)</label>
                    </div>
                    <div class="captcha-box">
                        <div class="captcha-left">
                            <input type="checkbox" id="captcha">
                            <label for="captcha">로봇이 아닙니다.</label>
                        </div>
                        <div class="captcha-right">
                            <img src="img/captcha.png" alt="캡챠 아이콘">
                        </div>
                    </div>

                    <button type="submit" class="signup-btn">가입하기</button>
                </form>
    </div>
